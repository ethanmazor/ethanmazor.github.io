<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hopfield Weight Matrix Designer</title>

  <!-- Tailwind CSS via Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 (UMD builds) + Babel standalone for JSX in the browser -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>

    /* Loading state - replaced by React on mount */

      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; color: #94a3b8;
      font-family: ui-monospace, "JetBrains Mono", monospace; font-size: 13px;

</head>
<body>
  <div id="root"><div id="loading">initializing</div></div>

  <script type="text/babel" data-presets="react">
    const { useState, useMemo, useEffect, useRef, forwardRef } = React;

    /* ============================================================
       Inline SVG icons (replacing lucide-react)
       ============================================================ */

    const Icon = ({ children, size = 24, className = '', ...rest }) => (

           viewBox="0 0 24 24" fill="none" stroke="currentColor"

           className={className} {...rest}>{children}</svg>
    );
    const Copy = (p) => (
      <Icon {...p}>
        <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/>
        <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
      </Icon>
    );
    const Check = (p) => (
      <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>
    );
    const RotateCcw = (p) => (
      <Icon {...p}>
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </Icon>
    );
    const Zap = (p) => (
      <Icon {...p}>
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </Icon>
    );
    const AlertTriangle = (p) => (
      <Icon {...p}>
        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/>
        <line x1="12" x2="12" y1="9" y2="13"/>
        <line x1="12" x2="12.01" y1="17" y2="17"/>
      </Icon>
    );
    const Network = (p) => (
      <Icon {...p}>
        <rect x="16" y="16" width="6" height="6" rx="1"/>
        <rect x="2" y="16" width="6" height="6" rx="1"/>
        <rect x="9" y="2" width="6" height="6" rx="1"/>
        <path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/>
        <path d="M12 12V8"/>
      </Icon>
    );
    const Circle = (p) => (
      <Icon {...p}><circle cx="12" cy="12" r="10"/></Icon>
    );
    const Activity = (p) => (
      <Icon {...p}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></Icon>
    );
    const Download = (p) => (
      <Icon {...p}>
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" x2="12" y1="15" y2="3"/>
      </Icon>
    );


    /* ============================================================
       Hopfield Weight Matrix Designer
       ============================================================ */

// ===== Constants =====
const MAX_N = 4;
const OPEN = 1e-12;          // 1 pS
const DEFAULT_EDGE_NS = 100; // nS — recurrent weight default
const BUDGET = 10;           // uS per neuron
const DEFAULT_F = 3.0;       // uS

// ===== Conductance helpers =====
const fmtCond = (s) => {
  if (s < 1e-11) return '1.000D-12';
  if (s < 1e-6) return (s * 1e9).toFixed(3) + 'D-9';
  return (s * 1e6).toFixed(3) + 'D-6';
};

const fmtSymb = (s, edgeS) => {
  if (s < 1e-11) return 'OPEN';
  if (Math.abs(s - edgeS) < 1e-13) return 'MED';
  if (s < 1e-6) return Math.round(s * 1e9) + 'n';
  return (s * 1e6).toFixed(1) + 'u';
};

// ===== Graph helpers =====
const isEdge = (adj, i, j) => {
  if (i === j) return false;
  const a = Math.min(i, j), b = Math.max(i, j);
  return !!adj[a]?.[b];
};

const setEdge = (adj, i, j, v) => {
  if (i === j) return adj;
  const a = Math.min(i, j), b = Math.max(i, j);
  const next = adj.map((r) => [...r]);
  next[a][b] = v;
  return next;
};

const emptyAdj = () => Array.from({ length: MAX_N }, () => Array(MAX_N).fill(false));

// ===== Matrix builder =====
function computeMatrix(N, adj, c1, c2, f1, f2, edgeS) {
  const M = Array.from({ length: 8 }, () => Array(6).fill(OPEN));
  for (let k = 0; k < N; k++) {
    const pR = 2 * k, nR = 2 * k + 1;
    if (c1[k] === 'HIGH') M[pR][0] = f1[k] * 1e-6;
    else if (c1[k] === 'LOW') M[nR][0] = f1[k] * 1e-6;
    if (c2[k] === 'HIGH') M[pR][1] = f2[k] * 1e-6;
    else if (c2[k] === 'LOW') M[nR][1] = f2[k] * 1e-6;
    for (let i = 0; i < N; i++) {
      if (i === k) continue;
      const c = i + 2;
      if (isEdge(adj, i, k)) {
        M[pR][c] = OPEN;
        M[nR][c] = edgeS;
      } else {
        M[pR][c] = edgeS;
        M[nR][c] = OPEN;
      }
    }
  }
  return M;
}

const neuronUsage = (M, k) =>
  ([...M[2 * k], ...M[2 * k + 1]].reduce((a, b) => a + b, 0)) * 1e6;

function buildScilab(N, M, adj, c1, c2) {
  const edges = [];
  for (let i = 0; i < N; i++)
    for (let j = i + 1; j < N; j++)
      if (isEdge(adj, i, j)) edges.push(`N${i + 1}-N${j + 1}`);
  const fmtSt = (arr) =>
    '[' +
    arr.slice(0, N).map((s) => (s === 'HIGH' ? '1' : s === 'LOW' ? '0' : 'free')).join(',') +
    ']';
  const header = [
    `// Graph: ${edges.length ? edges.join(', ') : '(no edges)'}`,
    `// Col 1 state: ${fmtSt(c1)}   Col 2 state: ${fmtSt(c2)}`,
    `// Rows: N1p N1n N2p N2n N3p N3n N4p N4n | Cols: In1 In2 fromN1 fromN2 fromN3 fromN4`,
  ].join('\n');
  const matrix =
    '[ \n' +
    M.map((row, i) => row.map(fmtCond).join(',') + (i === 7 ? '' : ';')).join('\n') +
    '\n]';
  return { header, matrix, full: header + '\n' + matrix };
}

// ===== Graph editor =====
const NODE_R = 28;
const SVG_SIZE = 360;

const nodePositions = (N) => {
  if (N === 0) return [];
  if (N === 1) return [{ x: SVG_SIZE / 2, y: SVG_SIZE / 2 }];
  if (N === 2) {
    // horizontal pair, ascending left -> right
    const off = 95;
    return [
      { x: SVG_SIZE / 2 - off, y: SVG_SIZE / 2 },
      { x: SVG_SIZE / 2 + off, y: SVG_SIZE / 2 },
    ];
  }
  // N === 3 or N === 4: 2x2 grid, ascending row-major (left -> right, top -> bottom)
  const dx = 100, dy = 90;
  const grid = [
    { x: SVG_SIZE / 2 - dx, y: SVG_SIZE / 2 - dy }, // N1 top-left
    { x: SVG_SIZE / 2 + dx, y: SVG_SIZE / 2 - dy }, // N2 top-right
    { x: SVG_SIZE / 2 - dx, y: SVG_SIZE / 2 + dy }, // N3 bottom-left
    { x: SVG_SIZE / 2 + dx, y: SVG_SIZE / 2 + dy }, // N4 bottom-right
  ];
  return grid.slice(0, N);
};

const GraphEditor = forwardRef(function GraphEditor(
  { N, adj, setAdj, selected, setSelected, c1, c2 },
  svgRef
) {
  const positions = useMemo(() => nodePositions(N), [N]);
  const [hover, setHover] = useState(null);

  const handleNode = (i) => {
    if (selected === null) setSelected(i);
    else if (selected === i) setSelected(null);
    else {
      setAdj((prev) => setEdge(prev, selected, i, !isEdge(prev, selected, i)));
      setSelected(null);
    }
  };

  const edges = [];
  for (let i = 0; i < N; i++)
    for (let j = i + 1; j < N; j++)
      if (isEdge(adj, i, j))
        edges.push({ i, j, p1: positions[i], p2: positions[j] });

  const preview =
    selected !== null && hover !== null && hover !== selected
      ? {
          p1: positions[selected],
          p2: positions[hover],
          removing: isEdge(adj, selected, hover),
        }
      : null;

  const stateGlow = (s) =>
    s === 'HIGH' ? '#fbbf24' : s === 'LOW' ? '#818cf8' : null;

  return (
    <div className="relative">
      <svg
        ref={svgRef}
        viewBox={`0 0 ${SVG_SIZE} ${SVG_SIZE}`}
        className="w-full h-auto bg-slate-950/60 rounded-lg border border-slate-800"
        onClick={() => setSelected(null)}
      >
        <defs>
          <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path
              d="M 20 0 L 0 0 0 20"
              fill="none"
              stroke="rgba(148,164,184,0.05)"
              strokeWidth="1"
            />
          </pattern>
          <radialGradient id="nodeGrad" cx="0.3" cy="0.3">
            <stop offset="0%" stopColor="#1e293b" />
            <stop offset="100%" stopColor="#0b1220" />
          </radialGradient>
        </defs>
        <rect width={SVG_SIZE} height={SVG_SIZE} fill="url(#grid)" />

        {/* Edges - halo (soft glow under main line) */}
        {edges.map(({ i, j, p1, p2 }) => (
          <line
            key={`h-${i}-${j}`}
            x1={p1.x}
            y1={p1.y}
            x2={p2.x}
            y2={p2.y}
            stroke="#f472b6"
            strokeWidth="9"
            strokeLinecap="round"
            opacity="0.20"
          />
        ))}
        {/* Edges - main stroke */}
        {edges.map(({ i, j, p1, p2 }) => (
          <line
            key={`e-${i}-${j}`}
            x1={p1.x}
            y1={p1.y}
            x2={p2.x}
            y2={p2.y}
            stroke="#f472b6"
            strokeWidth="3"
            strokeLinecap="round"
          />
        ))}

        {/* Preview */}
        {preview && (
          <line
            data-no-export="true"
            x1={preview.p1.x}
            y1={preview.p1.y}
            x2={preview.p2.x}
            y2={preview.p2.y}
            stroke={preview.removing ? '#ef4444' : '#5eead4'}
            strokeWidth="2"
            strokeDasharray="4 5"
            opacity="0.75"
          />
        )}

        {/* Nodes */}
        {positions.map((p, i) => {
          const isSel = selected === i;
          const isHov = hover === i;
          const initGlow = stateGlow(c1[i]);
          return (
            <g
              key={`n-${i}`}
              onClick={(e) => {
                e.stopPropagation();
                handleNode(i);
              }}
              onMouseEnter={() => setHover(i)}
              onMouseLeave={() => setHover(null)}
              className="cursor-pointer"
            >
              {isSel && (
                <circle
                  data-no-export="true"
                  cx={p.x}
                  cy={p.y}
                  r={NODE_R + 7}
                  fill="none"
                  stroke="#5eead4"
                  strokeWidth="1.5"
                  opacity="0.6"
                  strokeDasharray="3 3"
                >
                  <animateTransform
                    attributeName="transform"
                    attributeType="XML"
                    type="rotate"
                    from={`0 ${p.x} ${p.y}`}
                    to={`360 ${p.x} ${p.y}`}
                    dur="14s"
                    repeatCount="indefinite"
                  />
                </circle>
              )}
              {initGlow && (
                <circle
                  cx={p.x}
                  cy={p.y}
                  r={NODE_R + 2}
                  fill="none"
                  stroke={initGlow}
                  strokeWidth="2"
                  opacity="0.55"
                />
              )}
              <circle
                cx={p.x}
                cy={p.y}
                r={NODE_R}
                fill="url(#nodeGrad)"
                stroke={isSel ? '#5eead4' : isHov ? '#94a3b8' : '#475569'}
                strokeWidth={isSel ? 2.5 : 2}
              />
              <text
                x={p.x}
                y={p.y + 5}
                textAnchor="middle"
                fontFamily="ui-monospace, 'JetBrains Mono', monospace"
                fontSize="14"
                fontWeight="600"
                fill="#e2e8f0"
                pointerEvents="none"
              >
                N{i + 1}
              </text>
              {/* Kick indicator (small dot below) */}
              {c2[i] !== 'UN' && (
                <circle
                  cx={p.x}
                  cy={p.y + NODE_R + 8}
                  r="3"
                  fill={c2[i] === 'HIGH' ? '#fbbf24' : '#818cf8'}
                />
              )}
            </g>
          );
        })}
      </svg>
    </div>
  );
});

// ===== State pill (HI/LO/–) =====
function StatePill({ value, onChange, mode = 'state' }) {
  const labelHigh = mode === 'kick' ? '+' : 'HI';
  const labelLow = mode === 'kick' ? '−' : 'LO';
  const opts = [
    { v: 'HIGH', label: labelHigh, cls: 'text-amber-300 border-amber-400/60 bg-amber-400/15' },
    { v: 'LOW', label: labelLow, cls: 'text-indigo-300 border-indigo-400/60 bg-indigo-400/15' },
    { v: 'UN', label: '—', cls: 'text-slate-400 border-slate-500/40 bg-slate-700/30' },
  ];
  return (
    <div className="inline-flex rounded-md border border-slate-700 bg-slate-900/60 p-0.5 gap-0.5">
      {opts.map((o) => {
        const active = value === o.v;
        return (
          <button
            key={o.v}
            onClick={() => onChange(o.v)}
            className={
              'px-2 py-1 text-xs font-mono font-semibold rounded transition-all ' +
              (active
                ? o.cls + ' border'
                : 'text-slate-500 hover:text-slate-300 border border-transparent')
            }
          >
            {o.label}
          </button>
        );
      })}
    </div>
  );
}

// ===== Main app =====
function HopfieldDesigner() {
  const [N, setN] = useState(4);
  const [adj, setAdj] = useState(emptyAdj());
  const [c1, setC1] = useState(Array(MAX_N).fill('UN'));
  const [c2, setC2] = useState(Array(MAX_N).fill('UN'));
  const [f1, setF1] = useState(Array(MAX_N).fill(DEFAULT_F));
  const [f2, setF2] = useState(Array(MAX_N).fill(DEFAULT_F));
  const [edgeW, setEdgeW] = useState(DEFAULT_EDGE_NS); // recurrent weight in nS
  const [selected, setSelected] = useState(null);
  const [tab, setTab] = useState('scilab'); // 'scilab' | 'symbolic'
  const [copied, setCopied] = useState(false);
  const svgRef = useRef(null);

  const edgeS = edgeW * 1e-9; // nS -> S

  const M = useMemo(
    () => computeMatrix(N, adj, c1, c2, f1, f2, edgeS),
    [N, adj, c1, c2, f1, f2, edgeS]
  );
  const scilab = useMemo(() => buildScilab(N, M, adj, c1, c2), [N, M, adj, c1, c2]);
  const symb = useMemo(() => symbolicTable(N, M, edgeS), [N, M, edgeS]);
  const usages = useMemo(
    () => Array.from({ length: N }, (_, k) => neuronUsage(M, k)),
    [M, N]
  );
  const edgeCount = useMemo(() => {
    let c = 0;
    for (let i = 0; i < N; i++)
      for (let j = i + 1; j < N; j++) if (isEdge(adj, i, j)) c++;
    return c;
  }, [adj, N]);

  const updateC = (setter) => (i, v) => setter((prev) => prev.map((x, k) => (k === i ? v : x)));
  const updateF = (setter) => (i, v) =>
    setter((prev) =>
      prev.map((x, k) => (k === i ? Math.max(0, Math.min(BUDGET, parseFloat(v) || 0)) : x))
    );

  const reset = () => {
    setAdj(emptyAdj());
    setC1(Array(MAX_N).fill('UN'));
    setC2(Array(MAX_N).fill('UN'));
    setF1(Array(MAX_N).fill(DEFAULT_F));
    setF2(Array(MAX_N).fill(DEFAULT_F));
    setEdgeW(DEFAULT_EDGE_NS);
    setSelected(null);
  };

  const copyOut = () => {
    const txt = tab === 'scilab' ? scilab.matrix : symb;
    navigator.clipboard.writeText(txt);
    setCopied(true);
    setTimeout(() => setCopied(false), 1400);
  };

  const downloadSVG = () => {
    if (!svgRef.current) return;
    const clone = svgRef.current.cloneNode(true);
    // Strip interactive-only elements (selection ring, hover preview)
    clone.querySelectorAll('[data-no-export]').forEach((el) => el.remove());
    // Ensure SVG namespaces are present for standalone files
    if (!clone.getAttribute('xmlns')) {
      clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    }
    if (!clone.getAttribute('xmlns:xlink')) {
      clone.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');
    }
    const svgText =
      '<?xml version="1.0" encoding="UTF-8" standalone="no"?>\n' +
      new XMLSerializer().serializeToString(clone);
    const blob = new Blob([svgText], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `hopfield_N${N}_${edgeCount}edges.svg`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  // When N changes, clear edges that involve removed neurons
  useEffect(() => {
    setAdj((prev) => {
      const next = prev.map((r) => [...r]);
      for (let i = 0; i < MAX_N; i++)
        for (let j = i + 1; j < MAX_N; j++) {
          if (i >= N || j >= N) next[i][j] = false;
        }
      return next;
    });
    setSelected(null);
  }, [N]);

  return (
    <div
      className="min-h-screen bg-slate-950 text-slate-200 p-4 sm:p-6"
      style={{
        backgroundImage:
          'radial-gradient(ellipse at top, rgba(56, 189, 248, 0.08), transparent 60%), radial-gradient(ellipse at bottom right, rgba(244, 114, 182, 0.06), transparent 60%)',
        fontFamily:
          "ui-sans-serif, 'IBM Plex Sans', system-ui, -apple-system, BlinkMacSystemFont, sans-serif",
      }}
    >
      <div className="max-w-6xl mx-auto">
        {/* Header */}
        <header className="flex flex-wrap items-center justify-between gap-4 mb-6 pb-4 border-b border-slate-800">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500/20 to-pink-500/20 border border-cyan-400/30 flex items-center justify-center">
              <Network size={20} className="text-cyan-300" />
            </div>
            <div>
              <h1 className="text-lg sm:text-xl font-semibold tracking-tight text-slate-100 leading-tight">
                Hopfield Weight Matrix Designer
              </h1>
              <p className="text-xs text-slate-500 font-mono mt-0.5">
                FPAA · single CAB · 8×6 VMM
              </p>
            </div>
          </div>
          <div className="flex items-center gap-3">
            <label className="flex items-center gap-2 text-xs font-mono text-slate-400">
              N =
              <div className="inline-flex bg-slate-900 border border-slate-700 rounded-md overflow-hidden">
                {[1, 2, 3, 4].map((n) => (
                  <button
                    key={n}
                    onClick={() => setN(n)}
                    className={
                      'px-3 py-1.5 text-sm font-semibold transition-colors ' +
                      (N === n
                        ? 'bg-cyan-400/15 text-cyan-300'
                        : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800')
                    }
                  >
                    {n}
                  </button>
                ))}
              </div>
            </label>
            <button
              onClick={reset}
              className="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-slate-300 bg-slate-900 border border-slate-700 rounded-md hover:bg-slate-800 hover:border-slate-600 transition-colors"
            >
              <RotateCcw size={13} />
              Reset
            </button>
          </div>
        </header>

        {/* Main grid */}
        <div className="grid lg:grid-cols-5 gap-4">
          {/* Graph */}
          <section className="lg:col-span-2 bg-slate-900/40 border border-slate-800 rounded-xl p-4">
            <div className="flex items-center justify-between mb-3">
              <h2 className="text-sm font-semibold uppercase tracking-wider text-slate-400 flex items-center gap-2">
                <Circle size={12} className="text-cyan-400" />
                Graph
              </h2>
              <div className="flex items-center gap-3">
                <span className="text-xs font-mono text-slate-500">
                  {edgeCount} edge{edgeCount === 1 ? '' : 's'}
                </span>
                <button
                  onClick={downloadSVG}
                  title="Download SVG of the network"
                  className="inline-flex items-center gap-1.5 px-2.5 py-1 text-xs font-medium text-slate-200 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded transition-colors"
                >
                  <Download size={12} />
                  SVG
                </button>
              </div>
            </div>

            <GraphEditor
              ref={svgRef}
              N={N}
              adj={adj}
              setAdj={setAdj}
              selected={selected}
              setSelected={setSelected}
              c1={c1}
              c2={c2}
            />

            <div className="mt-3 text-xs font-mono text-slate-400 min-h-[1.25rem]">
              {selected !== null ? (
                <span className="text-cyan-300">
                  N{selected + 1} selected → click another neuron to toggle edge
                </span>
              ) : (
                <span>Click a neuron, then click another to toggle an edge</span>
              )}
            </div>

            {/* Recurrent weight */}
            <div className="mt-4 pt-4 border-t border-slate-800">
              <div className="text-[10px] uppercase tracking-widest text-slate-500 mb-2">
                Recurrent weight
              </div>
              <div className="flex items-center gap-2">
                <input
                  type="number"
                  step="10"
                  min="0"
                  max="1000"
                  value={edgeW}
                  onChange={(e) => {
                    const v = parseFloat(e.target.value);
                    setEdgeW(isNaN(v) ? 0 : Math.max(0, Math.min(1000, v)));
                  }}
                  className="w-24 px-2 py-1 text-xs font-mono bg-slate-900 border border-slate-700 rounded text-slate-200 focus:outline-none focus:border-cyan-400/60"
                />
                <span className="text-xs font-mono text-slate-400">nS</span>
                <button
                  onClick={() => setEdgeW(DEFAULT_EDGE_NS)}
                  className="ml-auto text-[10px] font-mono text-slate-500 hover:text-slate-300 transition-colors"
                >
                  default
                </button>
              </div>
              <div className="mt-1.5 text-[10px] font-mono text-slate-500">
                applied to every recurrent entry (edge & non-edge)
              </div>
            </div>

            {/* Legend */}
            <div className="mt-4 pt-4 border-t border-slate-800 text-xs space-y-1.5">
              <div className="text-[10px] uppercase tracking-widest text-slate-500 mb-2">
                Legend
              </div>
              <div className="flex items-center gap-2 font-mono text-slate-400">
                <div className="w-6 h-0.5 bg-pink-400" />
                <span>edge → inhibitory weight</span>
              </div>
              <div className="flex items-center gap-2 font-mono text-slate-400">
                <span className="w-3 h-3 rounded-full ring-2 ring-amber-400/60" />
                <span>init HIGH (col 1)</span>
              </div>
              <div className="flex items-center gap-2 font-mono text-slate-400">
                <span className="w-3 h-3 rounded-full ring-2 ring-indigo-400/60" />
                <span>init LOW (col 1)</span>
              </div>
              <div className="flex items-center gap-2 font-mono text-slate-400">
                <span className="inline-block w-3 h-3 relative">
                  <span className="absolute bottom-0 left-1/2 -translate-x-1/2 w-1.5 h-1.5 rounded-full bg-amber-400" />
                </span>
                <span>+ kick (col 2)</span>
              </div>
              <div className="flex items-center gap-2 font-mono text-slate-400">
                <span className="inline-block w-3 h-3 relative">
                  <span className="absolute bottom-0 left-1/2 -translate-x-1/2 w-1.5 h-1.5 rounded-full bg-indigo-400" />
                </span>
                <span>− kick (col 2)</span>
              </div>
            </div>
          </section>

          {/* State controls */}
          <section className="lg:col-span-3 bg-slate-900/40 border border-slate-800 rounded-xl p-4">
            <div className="flex items-center justify-between mb-3">
              <h2 className="text-sm font-semibold uppercase tracking-wider text-slate-400 flex items-center gap-2">
                <Zap size={12} className="text-amber-400" />
                Forcing
              </h2>
              <div className="text-xs font-mono text-slate-500">F in µS · budget 10µS</div>
            </div>

            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="text-[10px] uppercase tracking-widest text-slate-500 border-b border-slate-800">
                    <th className="text-left py-2 pr-2 font-medium">Neuron</th>
                    <th className="text-left px-2 py-2 font-medium">
                      Col 1 <span className="text-slate-600">init</span>
                    </th>
                    <th className="text-left px-2 py-2 font-medium">F₁ (µS)</th>
                    <th className="text-left px-2 py-2 font-medium">
                      Col 2 <span className="text-slate-600">kick (±)</span>
                    </th>
                    <th className="text-left px-2 py-2 font-medium">F₂ (µS)</th>
                    <th className="text-right px-2 py-2 font-medium">Budget</th>
                  </tr>
                </thead>
                <tbody>
                  {Array.from({ length: N }, (_, k) => {
                    const u = usages[k];
                    const ok = u <= BUDGET + 1e-6;
                    const tight = u > BUDGET * 0.85;
                    return (
                      <tr
                        key={k}
                        className="border-b border-slate-800/50 hover:bg-slate-900/40"
                      >
                        <td className="py-2.5 pr-2 font-mono font-semibold text-slate-200">
                          N{k + 1}
                        </td>
                        <td className="px-2 py-2.5">
                          <StatePill value={c1[k]} onChange={(v) => updateC(setC1)(k, v)} />
                        </td>
                        <td className="px-2 py-2.5">
                          <input
                            type="number"
                            step="0.5"
                            min="0"
                            max={BUDGET}
                            value={f1[k]}
                            onChange={(e) => updateF(setF1)(k, e.target.value)}
                            disabled={c1[k] === 'UN'}
                            className="w-16 px-2 py-1 text-xs font-mono bg-slate-900 border border-slate-700 rounded text-slate-200 disabled:opacity-30 focus:outline-none focus:border-cyan-400/60"
                          />
                        </td>
                        <td className="px-2 py-2.5">
                          <StatePill value={c2[k]} onChange={(v) => updateC(setC2)(k, v)} mode="kick" />
                        </td>
                        <td className="px-2 py-2.5">
                          <input
                            type="number"
                            step="0.5"
                            min="0"
                            max={BUDGET}
                            value={f2[k]}
                            onChange={(e) => updateF(setF2)(k, e.target.value)}
                            disabled={c2[k] === 'UN'}
                            className="w-16 px-2 py-1 text-xs font-mono bg-slate-900 border border-slate-700 rounded text-slate-200 disabled:opacity-30 focus:outline-none focus:border-cyan-400/60"
                          />
                        </td>
                        <td className="px-2 py-2.5 text-right">
                          <span
                            className={
                              'inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-mono ' +
                              (!ok
                                ? 'bg-red-500/20 text-red-300'
                                : tight
                                ? 'bg-amber-500/15 text-amber-300'
                                : 'bg-emerald-500/15 text-emerald-300')
                            }
                          >
                            {!ok && <AlertTriangle size={11} />}
                            {u.toFixed(2)}
                          </span>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            {usages.some((u) => u > BUDGET + 1e-6) && (
              <div className="mt-3 px-3 py-2 bg-red-500/10 border border-red-500/30 rounded text-xs text-red-300 font-mono flex items-start gap-2">
                <AlertTriangle size={14} className="flex-shrink-0 mt-0.5" />
                <span>
                  One or more neurons exceed the 10 µS budget. Reduce F values or relax forcing.
                </span>
              </div>
            )}
          </section>
        </div>

        {/* Output */}
        <section className="mt-4 bg-slate-900/40 border border-slate-800 rounded-xl overflow-hidden">
          <div className="flex items-center justify-between px-4 py-3 border-b border-slate-800">
            <div className="flex items-center gap-3">
              <h2 className="text-sm font-semibold uppercase tracking-wider text-slate-400 flex items-center gap-2">
                <Activity size={12} className="text-pink-400" />
                Weights matrix
              </h2>
              <div className="flex bg-slate-900 border border-slate-700 rounded overflow-hidden text-xs">
                <button
                  onClick={() => setTab('scilab')}
                  className={
                    'px-3 py-1 font-mono ' +
                    (tab === 'scilab'
                      ? 'bg-cyan-400/15 text-cyan-300'
                      : 'text-slate-400 hover:text-slate-200')
                  }
                >
                  Scilab
                </button>
                <button
                  onClick={() => setTab('symbolic')}
                  className={
                    'px-3 py-1 font-mono ' +
                    (tab === 'symbolic'
                      ? 'bg-cyan-400/15 text-cyan-300'
                      : 'text-slate-400 hover:text-slate-200')
                  }
                >
                  Symbolic
                </button>
              </div>
            </div>
            <button
              onClick={copyOut}
              className="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-slate-200 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded transition-colors"
            >
              {copied ? <Check size={13} className="text-emerald-400" /> : <Copy size={13} />}
              {copied ? 'Copied' : 'Copy'}
            </button>
          </div>

          <div className="p-4">
            <pre
              className="text-xs leading-relaxed overflow-x-auto text-slate-300 font-mono"
              style={{ fontFamily: "ui-monospace, 'JetBrains Mono', 'Menlo', monospace" }}
            >
              {tab === 'scilab' ? scilab.full : symb}
            </pre>
          </div>
        </section>

        <footer className="mt-6 text-center text-[10px] font-mono text-slate-600 tracking-wider uppercase">
          Sign convention: edge → inhibitory · no edge → excitatory
        </footer>
      </div>
    </div>
  );
}

// ===== Symbolic table renderer =====
function symbolicTable(N, M, edgeS) {
  const colHdr = ['In1', 'In2', '->N1', '->N2', '->N3', '->N4'];
  const rowHdr = ['N1p', 'N1n', 'N2p', 'N2n', 'N3p', 'N3n', 'N4p', 'N4n'];
  const w = 8;
  const pad = (s) => String(s).padEnd(w);

  let out = '       ' + colHdr.map(pad).join('') + '\n';
  for (let r = 0; r < 8; r++) {
    const k = Math.floor(r / 2);
    let line = pad(rowHdr[r]) + '[ ';
    for (let c = 0; c < 6; c++) {
      // Diagonal self entry
      if (c >= 2 && c - 2 === k && k < N) {
        line += pad('--');
      } else {
        line += pad(fmtSymb(M[r][c], edgeS));
      }
    }
    line += ']';
    out += line + '\n';
  }
  const edgeLabel = edgeS >= 1e-6
    ? (edgeS * 1e6).toFixed(2) + 'µS'
    : Math.round(edgeS * 1e9) + 'nS';
  out += `\nLegend: MED=${edgeLabel}  OPEN=1pS  --=self(OPEN)  forcing in µS`;
  return out;
}


    // Mount
    ReactDOM.createRoot(document.getElementById('root'))
      .render(<HopfieldDesigner />);
  </script>
